    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #333;
            background: #000;
            position: relative;
            z-index: 10000; /* Higher than warp overlay to render on top */
        }
        .arcade-font {
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
        }
        .sound-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        .sound-toggle:hover {
            color: #ccc;
        }
        .fps-display {
            position: absolute;
            top: 30px;
            right: 10px;
            color: #fff;
            font-size: 14px;
        }
        .debug {
            position: absolute;
            top: 400px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: "Courier New", monospace;
        }
        .docs-links {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #fff;
            font-size: 12px;
            text-align: right;
        }
        .docs-links a {
            color: #00ff00;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }
        .docs-links a:hover {
            color: #ffff00;
            text-decoration: underline;
        }
        .click-to-play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 255, 0, 0.3); /* Translucent green background */
            border: 3px solid rgba(0, 255, 0, 0.8); /* Semi-transparent green border */
            border-radius: 15px;
            padding: 20px 40px;
            font-family: "Courier New", Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00; /* Bright green text */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            cursor: pointer;
            user-select: none;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            z-index: 10001; /* Above canvas */
            backdrop-filter: blur(2px); /* Slight blur effect for better readability */
        }
        .click-to-play-button:hover {
            background: rgba(0, 255, 0, 0.5); /* More opaque on hover */
            border-color: rgba(0, 255, 0, 1); /* Solid green border on hover */
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 12px 24px rgba(0,0,0,0.7);
        }
        .click-to-play-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
        .click-to-play-button.hidden {
            display: none;
        }
        .warp-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; /* Canvas width */
            height: 600px; /* Canvas height */
            background: radial-gradient(circle at center, 
                rgba(0, 0, 0, 0) 0%,
                rgba(0, 0, 0, 0.3) 30%,
                rgba(0, 0, 0, 0.8) 60%,
                rgba(0, 0, 0, 1) 100%);
            z-index: 9998; /* Behind canvas but above other elements */
            pointer-events: none;
            transition: opacity 0.5s ease-in-out; /* Faster fade in/out */
            overflow: hidden;
        }
        .warp-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 160px 30px, #ddd, transparent),
                radial-gradient(1px 1px at 200px 60px, #fff, transparent),
                radial-gradient(2px 2px at 240px 20px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 280px 90px, #eee, transparent),
                radial-gradient(2px 2px at 320px 50px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 360px 80px, #fff, transparent);
            background-repeat: repeat;
            background-size: 400px 200px; /* Larger pattern for more stars */
            animation: warp-stars 1.5s linear infinite; /* Faster animation */
        }
        .warp-overlay::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: warp-expand 1.5s ease-out infinite; /* Faster expansion */
        }
        @keyframes warp-stars {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-200px); } /* More movement */
        }
        @keyframes warp-expand {
            0% { 
                width: 0; 
                height: 0; 
                opacity: 1;
                border-width: 2px;
            }
            100% { 
                width: 800px; 
                height: 800px; 
                opacity: 0;
                border-width: 1px;
            }
        }
        .warp-overlay.hidden {
            opacity: 0;
        }
        .warp-overlay.visible {
            opacity: 1;
        }
    </style>

        let GAME_CONFIG = {};

        // Game text constants
        const GAME_TEXT = {

        let shipTargetX = 0; // Target X position for ship
        let shipTargetY = 0; // Target Y position for ship
        let shipStartX = 0; // Starting X position for ship
        let shipStartY = 0; // Starting Y position for ship
        let starfieldFadeProgress = 0; // Starfield fade-in progress

        let activeWaves = [];
        let activeShockwaves = [];

        const GRID_COLS = Math.ceil(800 / GRID_SPACING) + 1;
        const GRID_ROWS = Math.ceil(600 / GRID_SPACING) + 1;

        // CLICK TO PLAY button functionality

        // Warp overlay functionality

        function showClickToPlayButton() {

        function handleClickToPlay() {
            console.log('[ClickToPlay] Button clicked - initializing audio and going to attract mode');
            console.log('[ClickToPlay] Current gameState:', gameState);
            console.log('[ClickToPlay] audioInitialized:', audioInitialized);

            initAudio();

        async function loadHighScores() {
            const savedScores = localStorage.getItem('blasteroidsHighScores');
            if (savedScores) {
                console.log("Loading high scores from localStorage.");
                highScores = JSON.parse(savedScores);
                return;
            }
            try {
                console.log("Loading default high scores from highscores.xml");
                const response = await fetch('highscores.xml?t=' + new Date().getTime()); // Cache busting
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const str = await response.text();
                const xmlDoc = new window.DOMParser().parseFromString(str, "application/xml");
                const entries = xmlDoc.querySelectorAll('entry');
                highScores = Array.from(entries).map(entry => ({
                    name: entry.getAttribute('name'),
                    score: parseInt(entry.getAttribute('score'), 10)
                }));
                saveHighScores();
            } catch (error) {
                console.error("Could not load highscores.xml. Using empty list.", error);
                highScores = [];
            }
        }

        function saveHighScores() {
            try {
                localStorage.setItem('blasteroidsHighScores', JSON.stringify(highScores));
                console.log("High scores saved to localStorage.");
            } catch (error) {
                console.error("Could not save high scores to localStorage.", error);
            }
        }

        function loadGameData() {
            return new Promise((resolve, reject) => {
                console.log("[DEBUG] Starting loadGameData...");
                fetch('gamedata.xml?t=' + new Date().getTime())
                    .then(response => { 
                        console.log("[DEBUG] Fetch response status:", response.status);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`); 
                        return response.text(); 
                    })
                    .then(str => { 
                        console.log("[DEBUG] XML text length:", str.length);
                        console.log("[DEBUG] First 200 chars of XML:", str.substring(0, 200));
                        return new window.DOMParser().parseFromString(str, "application/xml"); 
                    })
                    .then(async (xmlDoc) => {
                        console.log("[DEBUG] XML parsed successfully");
                        console.log("[DEBUG] XML document element:", xmlDoc.documentElement.tagName);
                        console.log("[DEBUG] XML document children:", xmlDoc.documentElement.children.length);
                        console.log("Parsing gamedata.xml...");
                        const config = {};
                        console.log("[DEBUG] Creating helper functions...");
                        const getFloat = (query) => {
                            const element = xmlDoc.querySelector(query);
                            if (!element) {
                                console.error("[DEBUG] Element not found:", query);
                                return 0;
                            }
                            const value = parseFloat(element.textContent);
                            console.log(`[DEBUG] getFloat(${query}) = ${value}`);
                            return value;
                        };
                        const getInt = (query) => {
                            const element = xmlDoc.querySelector(query);
                            if (!element) {
                                console.error("[DEBUG] Element not found:", query);
                                return 0;
                            }
                            const value = parseInt(element.textContent, 10);
                            console.log(`[DEBUG] getInt(${query}) = ${value}`);
                            return value;
                        };
                        const getAttrInt = (query, attr) => parseInt(xmlDoc.querySelector(query).getAttribute(attr), 10);
                        const getBoolean = (query) => xmlDoc.querySelector(query).textContent.toLowerCase() === 'true';
                        const getAttrBoolean = (query, attr) => {
                            const node = xmlDoc.querySelector(query);
                            return node && node.getAttribute(attr) === 'true';
                        };
                        
                        console.log("[DEBUG] Parsing ship config...");
                        config.ship = { 
                            thrust: getFloat('ship > thrust'), 
                            rotationSpeed: getFloat('ship > rotationSpeed'), 
                            maxSpeed: getInt('ship > maxSpeed'), 
                            friction: getFloat('ship > friction'), 
                            shieldDuration: getInt('ship > shieldDuration'), 
                            projectile: { 
                                speed: getInt('ship > projectile > speed'), 
                                lifetime: getInt('ship > projectile > lifetime') 
                            }, 
                            fireCooldown: getInt('ship > fireCooldown') 
                        };
                        console.log("[DEBUG] Ship config parsed:", config.ship);
                        config.physics = { debrisFriction: getFloat('physics > debrisFriction') };
                        config.enemies = {
                            saucer: { score: getInt('enemies > saucer > score') },
                            asteroids: { scoreLarge: getInt('enemies > asteroids > scoreLarge'), scoreMedium: getInt('enemies > asteroids > scoreMedium'), scoreSmall: getInt('enemies > asteroids > scoreSmall') },
                            cygnus: { rotationSpeed: getFloat('enemies > cygnus > rotationSpeed'), scoreNormal: getInt('enemies > cygnus > scoreNormal'), scoreEscaping: getInt('enemies > cygnus > scoreEscaping') },
                            novabomb: { radius: getInt('enemies > novabomb > radius'), pushForce: getFloat('enemies > novabomb > pushForce'), score: getInt('enemies > novabomb > score') },
                            graviton: { tractorPullSpeed: getFloat('enemies > graviton > tractorPullSpeed'), tractorTangentialForce: getFloat('enemies > graviton > tractorTangentialForce'), tractorMaxOrbitalSpeed: getFloat('enemies > graviton > tractorMaxOrbitalSpeed'), kickForce: getFloat('enemies > graviton > kickForce'), score: getInt('enemies > graviton > score'), baseOrbitRadius: getFloat('enemies > graviton > baseOrbitRadius') }
                        };
                        config.world = { 
                            blackHole: {
                                pullRadius: getFloat('world > blackHole > pullRadiusRatio') * canvas.width,
                                minPull: getFloat('world > blackHole > minPull'),
                                maxPull: getFloat('world > blackHole > maxPull'),
                                lethalRadius: getInt('world > blackHole > lethalRadius'),
                                baseSize: xmlDoc.querySelector('world > blackHole > baseSize') ? getInt('world > blackHole > baseSize') : 30,
                                growth: xmlDoc.querySelector('world > blackHole > growth') ? getFloat('world > blackHole > growth') : 0.15,
                                darkeningRadius: getFloat('world > blackHole > darkeningRadius') || 6.0,
                                shockwaveIntensity: getInt('world > blackHole > shockwaveIntensity') || 40,
                                shockwaveSpeed: getInt('world > blackHole > shockwaveSpeed') || 6,
                                shadowSpinMultiplier: getFloat('world > blackHole > shadowSpinMultiplier') || 2.0,
                                shadowLayers: getInt('world > blackHole > shadowLayers') || 3,
                                shadowOpacity: getFloat('world > blackHole > shadowOpacity') || 0.9
                            },
                            grid: {
                                opacity: xmlDoc.querySelector('world > grid > opacity') ? getFloat('world > grid > opacity') : 0
                            }
                        };
                        
                        const gameOverElement = xmlDoc.querySelector('gameplay > gameOverScreenDuration');
                        const attractModeElement = xmlDoc.querySelector('gameplay > attractModeDuration');
                        const attractMusicCooldownElement = xmlDoc.querySelector('gameplay > attractMusicCooldown');
                        const attractMusicPlayTimeElement = xmlDoc.querySelector('gameplay > attractMusicPlayTime');
                        const transitionOutElement = xmlDoc.querySelector('gameplay > transitionOutDuration');
                        const transitionStarsElement = xmlDoc.querySelector('gameplay > transitionStars');
                        const textCollisionElement = xmlDoc.querySelector('gameplay > textCollisionFragmentChance');
                        const textCollisionColorChangeElement = xmlDoc.querySelector('gameplay > textCollisionColorChangeCount');
                        const textCollisionPacmanElement = xmlDoc.querySelector('gameplay > textCollisionPacmanSpawnChance');
                        const pacmanLimitElement = xmlDoc.querySelector('gameplay > pacmanLimit');
                        const pacmanVolumeElement = xmlDoc.querySelector('gameplay > pacmanVolume');
                        const novabombVolumeElement = xmlDoc.querySelector('gameplay > novabombVolume');
                        console.log('pacmanVolumeElement found:', pacmanVolumeElement);
                        if (pacmanVolumeElement) {
                            console.log('pacmanVolume value:', pacmanVolumeElement.textContent);
                        }
                        const textColorsElement = xmlDoc.querySelector('gameplay > textColors');
                        const attractModeEnemySpawningElement = xmlDoc.querySelector('gameplay > attractModeEnemySpawning');
                        
                        // Parse attract mode enemy spawning configuration
                        let attractModeEnemySpawning = {
                            spawnInterval: 30,
                            enemyTypes: {
                                saucer: 0.3,
                                graviton: 0.2,
                                cygnus: 0.1,
                                novabomb: 0.1,
                                nothing: 0.3
                            }
                        };
                        
                        if (attractModeEnemySpawningElement) {
                            const spawnIntervalElement = attractModeEnemySpawningElement.querySelector('spawnInterval');
                            const enemyTypesElement = attractModeEnemySpawningElement.querySelector('enemyTypes');
                            
                            if (spawnIntervalElement) {
                                attractModeEnemySpawning.spawnInterval = parseInt(spawnIntervalElement.textContent, 10);
                            }
                            
                            if (enemyTypesElement) {
                                const saucerElement = enemyTypesElement.querySelector('saucer');
                                const gravitonElement = enemyTypesElement.querySelector('graviton');
                                const cygnusElement = enemyTypesElement.querySelector('cygnus');
                                const novabombElement = enemyTypesElement.querySelector('novabomb');
                                const nothingElement = enemyTypesElement.querySelector('nothing');
                                
                                if (saucerElement) attractModeEnemySpawning.enemyTypes.saucer = parseFloat(saucerElement.textContent);
                                if (gravitonElement) attractModeEnemySpawning.enemyTypes.graviton = parseFloat(gravitonElement.textContent);
                                if (cygnusElement) attractModeEnemySpawning.enemyTypes.cygnus = parseFloat(cygnusElement.textContent);
                                if (novabombElement) attractModeEnemySpawning.enemyTypes.novabomb = parseFloat(novabombElement.textContent);
                                if (nothingElement) attractModeEnemySpawning.enemyTypes.nothing = parseFloat(nothingElement.textContent);
                            }
                        }
                        
                        // Parse text colors
                        const textColors = [];
                        if (textColorsElement) {
                            const colorNodes = textColorsElement.querySelectorAll('color');
                            colorNodes.forEach(node => {
                                textColors.push(node.textContent);
                            });
                        }
                        
                        const endOfWaveDelayElement = xmlDoc.querySelector('gameplay > endOfWaveDelay');
                        
                        config.gameplay = { 
                            gameOverScreenDuration: gameOverElement ? parseFloat(gameOverElement.textContent) : 3,
                            attractModeDuration: attractModeElement ? parseFloat(attractModeElement.textContent) : 15,
                            attractMusicCooldown: attractMusicCooldownElement ? parseFloat(attractMusicCooldownElement.textContent) : 20,
                            attractMusicPlayTime: attractMusicPlayTimeElement ? parseFloat(attractMusicPlayTimeElement.textContent) : 30,
                            textCollisionFragmentChance: textCollisionElement ? parseFloat(textCollisionElement.textContent) : 0.15,
                            textCollisionColorChangeCount: textCollisionColorChangeElement ? parseInt(textCollisionColorChangeElement.textContent, 10) : 5,
                            textCollisionPacmanSpawnChance: textCollisionPacmanElement ? parseFloat(textCollisionPacmanElement.textContent) : 0.25,
                            pacmanLimit: pacmanLimitElement ? parseInt(pacmanLimitElement.textContent, 10) : 1,
                            pacmanVolume: pacmanVolumeElement ? parseFloat(pacmanVolumeElement.textContent) : 0.02,
                            novabombVolume: novabombVolumeElement ? parseFloat(novabombVolumeElement.textContent) : 0.3,
                            textColors: textColors.length > 0 ? textColors : ['yellow', 'lightblue', 'white', 'lightgreen', 'lightorange'],
                            attractModeEnemySpawning: attractModeEnemySpawning,
                            noShipSpawnChance: getFloat('gameplay > noShipSpawnChance') || 0.15,
                            waveTransitionDelay: getInt('gameplay > waveTransitionDelay') || 60,
                            endOfWaveDelay: endOfWaveDelayElement ? Math.round(parseFloat(endOfWaveDelayElement.textContent) * 60) : 120,
                            transitionOutDuration: transitionOutElement ? parseInt(transitionOutElement.textContent, 10) : 3,
                            transitionStars: transitionStarsElement ? {
                                count: parseInt(transitionStarsElement.querySelector('count')?.textContent || '60', 10),
                                minSpeed: parseFloat(transitionStarsElement.querySelector('minSpeed')?.textContent || '2'),
                                maxSpeed: parseFloat(transitionStarsElement.querySelector('maxSpeed')?.textContent || '4')
                            } : { count: 60, minSpeed: 2, maxSpeed: 4 },
                        };
                        
                        console.log('Final pacmanVolume config value:', config.gameplay.pacmanVolume);
                        
                        config.waves = Array.from(xmlDoc.querySelectorAll('waveManager > wave')).map(waveNode => {
                            const id = parseInt(waveNode.getAttribute('id'), 10);
                            const displayNameElement = waveNode.querySelector('displayName');
                            const backgroundImageElement = waveNode.querySelector('backgroundImage');
                            const missionObjectiveElement = waveNode.querySelector('missionObjective');
                            return {
                                id: id,
                                displayName: displayNameElement ? displayNameElement.textContent : null,
                                backgroundImage: backgroundImageElement ? backgroundImageElement.textContent : null,
                                missionObjective: missionObjectiveElement ? parseInt(missionObjectiveElement.textContent, 10) : null,
                                asteroids: getInt(`wave[id="${id}"] > asteroids`),
                                speedFactor: getFloat(`wave[id="${id}"] > speedFactor`),
                                shipSpawnRateMultiplier: getFloat(`wave[id="${id}"] > shipSpawnRateMultiplier`),
                                powerupLimit: getInt(`wave[id="${id}"] > powerupLimit`),
                                enemyShipLimit: getInt(`wave[id="${id}"] > enemyShipLimit`),
                                unlocks: {
                                    saucer:   getBoolean(`wave[id="${id}"] > unlocks > saucer`),
                                    graviton: getBoolean(`wave[id="${id}"] > unlocks > graviton`),
                                    cygnus:   getBoolean(`wave[id="${id}"] > unlocks > cygnus`),
                                    novabomb: getBoolean(`wave[id="${id}"] > unlocks > novabomb`)
                                }
                            };
                        });

                        // Parse powerups
                        const powerupsSection = xmlDoc.querySelector('powerups');
                        const powerupNodes = powerupsSection.querySelectorAll('powerup');
                        const powerupsConfig = [];
                        powerupNodes.forEach(node => {
                            powerupsConfig.push({
                                id: node.getAttribute('id'),
                                name: node.querySelector('name').textContent,
                                symbol: node.querySelector('symbol').textContent,
                                color: node.querySelector('color').textContent,
                                size: node.querySelector('size').textContent,

        /**
         * Update PRE_FLIGHT state
         */
        function updatePreFlight() {
            preFlightTimer++;
            
            // Calculate progress (0 to 1)
            const progress = Math.min(1.0, preFlightTimer / preFlightDuration);
            
            // Update starfield fade-in (should be full alpha before ship reaches center)
            starfieldFadeProgress = Math.min(1.0, progress * 1.5); // Faster fade-in
            
            // Auto-pilot ship to center with smooth easing
            const easeProgress = 1 - Math.pow(1 - progress, 3); // Cubic ease-out
            
            ship.x = shipStartX + (shipTargetX - shipStartX) * easeProgress;
            ship.y = shipStartY + (shipTargetY - shipStartY) * easeProgress;
            
            // Smoothly rotate ship to face forward
            const angleDelta = ((shipTargetAngle - shipStartAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
            ship.angle = shipStartAngle + angleDelta * easeProgress;
            
            // Update cinematic starfield (shared with pre-flight)
            if (cinematic) {
                cinematic.updateStarfield();
            }
            
            // Check if pre-flight is complete
            if (preFlightTimer >= preFlightDuration) {

                setGameState(GAME_STATE_CINEMATIC);
            }
        }

            const textTop = textY - textHeight / 2;
            const textBottom = textY + textHeight / 2;

                for (const asteroid of asteroids) { 
                    if (exp.hitObjects.has(asteroid.id)) continue; 
                    const dist = Math.hypot(asteroid.x - exp.x, asteroid.y - exp.y);

                        // Calculate force based on distance (100% at center, 80% at edge)
                        const distanceRatio = Math.min(1.0, dist / currentRadius);
                        const forceMultiplier = 1.0 - (distanceRatio * 0.2); // 100% to 80%
                        const actualForce = GAME_CONFIG.enemies.novabomb.pushForce * forceMultiplier;
                        
                        const pushAngle = Math.atan2(asteroid.y - exp.y, asteroid.x - exp.x); 
                        asteroid.vx += Math.cos(pushAngle) * actualForce; 
                        asteroid.vy += Math.sin(pushAngle) * actualForce; 
                        exp.hitObjects.add(asteroid.id); 
                    } 
                }

                        const distanceRatio = Math.min(1.0, dist / currentRadius);
                        const forceMultiplier = 1.0 - (distanceRatio * 0.2); // 100% to 80%
                        const actualForce = GAME_CONFIG.enemies.novabomb.pushForce * forceMultiplier;
                        
                        playBoingSound(); 
                        const pushAngle = Math.atan2(dy, dx); 
                        ship.vx -= Math.cos(pushAngle) * actualForce; 
                        ship.vy -= Math.sin(pushAngle) * actualForce; 
                        exp.hitObjects.add('ship'); 
                    }

                enemies.forEach(enemy => { 
                    if (enemy.isDestroyed || exp.hitObjects.has(enemy.id)) return; 
                    const dist = Math.hypot(enemy.x - exp.x, enemy.y - exp.y); 
                    if (dist < currentRadius + enemy.size) { 
                        // Calculate force based on distance (100% at center, 80% at edge)
                        const distanceRatio = Math.min(1.0, dist / currentRadius);
                        const forceMultiplier = 1.0 - (distanceRatio * 0.2); // 100% to 80%
                        const actualForce = GAME_CONFIG.enemies.novabomb.pushForce * forceMultiplier;
                        
                        const pushAngle = Math.atan2(enemy.y - exp.y, enemy.x - exp.x); 
                        enemy.vx += Math.cos(pushAngle) * actualForce; 
                        enemy.vy += Math.sin(pushAngle) * actualForce; 
                        exp.hitObjects.add(enemy.id); 
                    } 
                });
                
                // Push powerups
                powerups.forEach(powerup => { 
                    if (exp.hitObjects.has(`powerup_${powerup.x}_${powerup.y}`)) return; 
                    const dist = Math.hypot(powerup.x - exp.x, powerup.y - exp.y); 
                    if (dist < currentRadius + (powerup.radius || 12)) { 
                        // Calculate force based on distance (100% at center, 80% at edge)
                        const distanceRatio = Math.min(1.0, dist / currentRadius);
                        const forceMultiplier = 1.0 - (distanceRatio * 0.2); // 100% to 80%
                        const actualForce = GAME_CONFIG.enemies.novabomb.pushForce * forceMultiplier;
                        
                        const pushAngle = Math.atan2(powerup.y - exp.y, powerup.x - exp.x); 
                        powerup.vx += Math.cos(pushAngle) * actualForce; 
                        powerup.vy += Math.sin(pushAngle) * actualForce; 
                        exp.hitObjects.add(`powerup_${powerup.x}_${powerup.y}`); 
                    } 
                });
            } 
        }

        function checkCollisions() {

                                else if (enemy.type === 'novabomb') { enemy.destroy(); projectiles.splice(i, 1); projHit = true; break; }
                                projectiles.splice(i, 1); checkExtraLife(); projHit = true; break;
                            }

                        if (projHit) break;

                    }

                    if (Math.hypot(proj.x - enemy.x, proj.y - enemy.y) < enemy.size) {
                        if (enemy.type === 'saucer') { const awardedScore = GAME_CONFIG.enemies.saucer.score; score += awardedScore; createScorePopup(enemy.x, enemy.y, awardedScore, Math.atan2(enemy.y - ship.y, enemy.x - ship.x)); playSaucerHitSound(); destroyEnemy(enemy, proj.vx * 0.3, proj.vy * 0.3); } 
                        else if (enemy.type === 'graviton') { const awardedScore = GAME_CONFIG.enemies.graviton.score; score += awardedScore; createScorePopup(enemy.x, enemy.y, awardedScore, Math.atan2(enemy.y - ship.y, enemy.x - ship.x)); playSaucerHitSound(); destroyEnemy(enemy, proj.vx * 0.3, proj.vy * 0.3); }
                        else if (enemy.type === 'cygnus') { let awardedScore = enemy.state === 'escaping' ? GAME_CONFIG.enemies.cygnus.scoreEscaping : GAME_CONFIG.enemies.cygnus.scoreNormal; score += awardedScore; createScorePopup(enemy.x, enemy.y, awardedScore, Math.atan2(enemy.y - ship.y, enemy.x - ship.x)); playSaucerHitSound(); destroyEnemy(enemy, proj.vx * 0.3, proj.vy * 0.3, 'projectile'); }
                        else if (enemy.type === 'novabomb') { enemy.destroy(); projectiles.splice(i, 1); projHit = true; break; }
                        
                        projectiles.splice(i, 1); checkExtraLife(); projHit = true; break;

                if (projHit) continue;

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (enemy.isDestroyed) continue;
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const asteroid = asteroids[j];
                    if (enemy.type === 'graviton' && (asteroid === enemy.tractorTarget || asteroid.isWeaponized)) continue;
                    if (Math.hypot(enemy.x - asteroid.x, enemy.y - asteroid.y) < enemy.size + asteroid.size) {
                        if (enemy.type === 'novabomb') { playNovabombBounceSound(); const angle = Math.atan2(enemy.y - asteroid.y, enemy.x - asteroid.x); enemy.vx = Math.cos(angle) * enemy.speed; enemy.vy = Math.sin(angle) * enemy.speed; asteroid.vx -= Math.cos(angle) * 1.5; asteroid.vy -= Math.sin(angle) * 1.5; continue; }
                        if (enemy.type === 'cygnus') {
                            // Cygnus is immune; asteroid fragments as if shot, and black hole grows
                            let fragments = [];
                            if (enemy.myBlackHole) {
                                fragments = handleBlackHoleAsteroidCollision(enemy.myBlackHole, asteroid);
                            } else {
                                fragments = breakAsteroid(asteroid);

                        if (enemy.type === 'graviton') playGravitonExplosionSound();
                        destroyEnemy(enemy, asteroid.vx * 0.5, asteroid.vy * 0.5);

                }

            // Enemy-to-enemy collision detection
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy1 = enemies[i];
                if (enemy1.isDestroyed) continue;
                
                for (let j = i - 1; j >= 0; j--) {
                    const enemy2 = enemies[j];
                    if (enemy2.isDestroyed) continue;
                    
                    if (Math.hypot(enemy1.x - enemy2.x, enemy1.y - enemy2.y) < enemy1.size + enemy2.size) {
                        // Novabomb collision with other ships
                        if (enemy1.type === 'novabomb' || enemy2.type === 'novabomb') {
                            const novabomb = enemy1.type === 'novabomb' ? enemy1 : enemy2;
                            const otherEnemy = enemy1.type === 'novabomb' ? enemy2 : enemy1;

                            destroyEnemy(otherEnemy, 0, 0, 'novabomb');
                            novabomb.destroy(false); // Don't award points for enemy-to-enemy collision

                        }
                        
                        // Other enemy collisions (bounce off each other)
                        const angle = Math.atan2(enemy1.y - enemy2.y, enemy1.x - enemy2.x);
                        const speed = Math.max(enemy1.speed || 2, enemy2.speed || 2);
                        
                        enemy1.vx = Math.cos(angle) * speed;
                        enemy1.vy = Math.sin(angle) * speed;
                        enemy2.vx = -Math.cos(angle) * speed;
                        enemy2.vy = -Math.sin(angle) * speed;
                    }
                }
            }
            // REFACTOR: All hazards are now drawn from the unified enemies array.
            const allHazards = [...asteroids, ...enemies.filter(e => !e.isDestroyed)];
            for (const hazard of allHazards) {
                // Ship is immune to its own captured asteroid
                let skip = false;
                if (hazard.isWeaponized) {
                    for (const enemy of enemies) {
                        if (enemy.type === 'graviton' && enemy.tractorActive && enemy.tractorTarget === hazard) {
                            skip = true;
                            break;
                        }
                    }
                }
                if (skip) continue;
                if (Math.hypot(ship.x - hazard.x, ship.y - hazard.y) < hazard.size + ship.size) {
                    if (!ship.isShielded) { 
                        // Handle enemy ship collisions
                        if (enemies.includes(hazard)) {
                            // Special handling for Novabombs - make them explode
                            if (hazard.type === 'novabomb') {
                                hazard.destroy(false); // Don't award points for ship collision
                            } else {
                                // Destroy other enemy ships
                                destroyEnemy(hazard, ship.vx * 0.5, ship.vy * 0.5, 'ship');
                            }
                        }
                        killShip(); 
                        return; 
                    }
                }
            }
            
            // Check for tractor beam collisions
            for (const enemy of enemies) {
                if (enemy.type === 'graviton' && enemy.tractorActive && enemy.tractorTarget && !enemy.isDestroyed) {
                    const graviton = enemy;
                    const asteroid = enemy.tractorTarget;
                    
                    // Calculate the tractor beam as a line segment
                    const beamStartX = graviton.x;
                    const beamStartY = graviton.y;
                    const beamEndX = asteroid.x;
                    const beamEndY = asteroid.y;
                    
                    // Calculate distance from ship to the beam line
                    const A = ship.x - beamStartX;
                    const B = ship.y - beamStartY;
                    const C = beamEndX - beamStartX;
                    const D = beamEndY - beamStartY;
                    
                    const dot = A * C + B * D;
                    const lenSq = C * C + D * D;
                    let param = -1;
                    
                    if (lenSq !== 0) param = dot / lenSq;
                    
                    let xx, yy;
                    if (param < 0) {
                        xx = beamStartX;
                        yy = beamStartY;
                    } else if (param > 1) {
                        xx = beamEndX;
                        yy = beamEndY;
                    } else {
                        xx = beamStartX + param * C;
                        yy = beamStartY + param * D;
                    }
                    
                    const distanceToBeam = Math.hypot(ship.x - xx, ship.y - yy);
                    const beamCollisionRadius = 8; // Radius around the beam for collision
                    
                    if (distanceToBeam < beamCollisionRadius + ship.size) {

                            // Bounce the ship away from the beam
                            const bounceForce = 3.0;
                            const dx = ship.x - xx;
                            const dy = ship.y - yy;
                            const distance = Math.hypot(dx, dy);
                            
                            if (distance > 0) {
                                // Normalize and apply bounce force
                                ship.vx += (dx / distance) * bounceForce;
                                ship.vy += (dy / distance) * bounceForce;
                                
                                // Play a bounce sound
                                playBounceSound(ship.size);
                                
                                // Create a small particle effect at collision point
                                createColorfulParticleEffect(xx, yy, 10, 0.5);
                            }
                        }
                    }
                }
            }
            
            // REFACTOR: Wave completion logic now uses sub-mode system

                if (gameState === GAME_STATE_PLAYING && endOfWaveTimer === 0) {

                endOfWaveTimer--;
                if (endOfWaveTimer === 0 && gameState === GAME_STATE_PLAYING) {
                    setGameState(GAME_STATE_PRE_FLIGHT);
    
                }
            }
