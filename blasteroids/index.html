                for (let i = blackHoles.length - 1; i >= 0; i--) { const bh = blackHoles[i]; bh.update(); if (bh.isDestroyed) { blackHoles.splice(i, 1); } }

                updateProjectiles(); updateAsteroids(); updateParticleEffects(); updateNovaExplosions(); updateScorePopups();
                updatePowerups();
                checkWeaponizedAsteroidCollisions();
                checkCollisions();
                
                // Draw background image if sub-mode has one
                if (currentSubMode && currentSubMode.isActive) {
                    currentSubMode.drawBackground(ctx, canvas);
                }
                
                blackHoles.forEach(bh => bh.draw());
                drawAsteroids();
                drawPowerups();
                drawPowerupAttractLines(); // Draw attract force lines in verbose mode
                drawPowerupDestructionEffects();
                enemies.forEach(enemy => enemy.draw());
                drawParticleEffects();
                drawShip();
                drawShipPickupParticles();
                drawProjectiles();
                drawUI();
                drawNovaExplosions();
                drawShield();
                drawScorePopups();

                if (shipCapturedByBlackHole && !shipDead) {
                    // Animate ship spiraling into the center of the black hole
                    const bh = shipCapturedByBlackHole;
                    const captureFrames = 60; // Duration of animation
                    shipCaptureProgress++;
                    // Calculate spiral position
                    const t = shipCaptureProgress / captureFrames;
                    const angle = ship.angle + 0.5 * shipCaptureProgress; // Spin faster
                    const spiralRadius = Math.max(0, 40 * (1 - t));
                    ship.x = bh.x + Math.cos(angle) * spiralRadius;
                    ship.y = bh.y + Math.sin(angle) * spiralRadius;
                    ship.angle += 0.4 + 0.1 * shipCaptureProgress; // Spin up
                    // Optionally shrink ship as it approaches center
                    ship.size = Math.max(8, 20 * (1 - t));
                    if (shipCaptureProgress >= captureFrames) {
                        // Destroy ship at the center
                        ship.x = bh.x;
                        ship.y = bh.y;
                        ship.size = 20; // Reset for debris
                        killShip();
                        shipCapturedByBlackHole = null;
                        shipCaptureProgress = 0;
                    }
                }

            } else if (gameState === 'gameOver') {
                gameOverTimer++;
                updateShipDebris();
                for (let i = enemies.length - 1; i >= 0; i--) { enemies[i].update(); }
                for (let i = blackHoles.length - 1; i >= 0; i--) { blackHoles[i].update(); }
                updateProjectiles(); updateAsteroids(); updateParticleEffects(); updateNovaExplosions(); updateScorePopups();
                checkCollisions();
                
                blackHoles.forEach(bh => bh.draw());
                drawAsteroids(); enemies.forEach(enemy => enemy.draw()); drawParticleEffects(); drawShip(); drawProjectiles(); drawNovaExplosions(); drawScorePopups();
                
                drawUI();
                if (gameOverTimer >= GAME_CONFIG.gameplay.gameOverScreenDuration * 60) {
                    stopAllLoopingSounds();
                    playAttractMusic();
                    if (isNewHighScore(score)) {
                        highScoreEntryState = { initials: ['A', 'A', 'A'], currentIndex: 0, lastInputTime: 0, inputCooldown: 150 };
                        cleanupWave();
                        setGameState('highScoreEntry');
                    } else {
                        cleanupWave();
                        setGameState('highScoreDisplay');
                        highScoreDisplayTimer = 600;
                    }
                }
            } else if (gameState === 'highScoreEntry') {
                drawHighScoreEntryScreen();
            } else if (gameState === 'highScoreDisplay') {
                highScoreDisplayTimer--;
                drawHighScoreDisplay();
                if (highScoreDisplayTimer <= 0) {
                    playerHighScoreIndex = -1; 
                    setGameState('attract');
                    attractModeTimer = GAME_CONFIG.gameplay.attractModeDuration * 60;
                    attractModeEnemySpawnTimer = 0; // Reset enemy spawn timer
                    // Reset text collision tracking for new attract mode session
                    textCollisionCount = 0;
                    // Don't reset currentTextColorIndex - let the color persist
                }
            } else if (gameState === GAME_STATE_CINEMATIC) {
                // Handle cinematic input (for debug mode skip)
                if (cinematic && cinematic.handleInput()) {
                    // Cinematic was skipped, continue to next state
                    return;
                }
                
                // Update cinematic starfield (shared with pre-flight)
                if (cinematic) {
                    cinematic.updateStarfield();
                }
                
                // Draw starfield using cinematic starfield
                if (cinematic) {
                    cinematic.drawStarfieldWithAlpha(1.0);
                }
                
                // Draw ship (keeps ship visible during cinematics)
                drawShip();
                
                // Update and draw cinematic overlay
                if (cinematic) {
                    cinematic.update();
                    cinematic.draw();
                    
                    // Check if cinematic is complete
                    if (cinematic.isComplete()) {
                        if (currentWave === 0) {
                            // First wave - go through warp speed transition before spawning
                            currentWave = 1;
                            ship._isFirstTransition = true; // Flag to identify first transition
                            setGameState(GAME_STATE_TRANSITION_OUT);
            
                        } else {
                            // Regular wave cinematic complete - go to transition
                            setGameState(GAME_STATE_TRANSITION_OUT);

                        }
                    }
                }
            } else if (gameState === GAME_STATE_PRE_FLIGHT) {
                // Update pre-flight state
                updatePreFlight();
                
                // Draw pre-flight scene
                drawPreFlight();
            }
            updateDebugInfo();

            // Draw and update wave announcement overlay
            if (waveAnnouncement) {

                const progress = 1 - waveAnnouncement.timer / waveAnnouncement.total;
                // Start fading when 60% through the animation (sooner than before)
                const fadeStart = 0.6;
                const fade = progress < fadeStart ? 1 : (1 - (progress - fadeStart) / (1 - fadeStart));
                const scale = 2 - (progress * 1.5); // 2x to 0.5x (faster reduction)
                const blur = 32 * (1 - progress); // 32px to 0px
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(scale, scale);
                ctx.globalAlpha = fade;
                
                // Draw main announcement text
                ctx.font = `bold 72px 'Courier New', monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#FFD600';
                ctx.shadowBlur = blur;
                ctx.fillStyle = '#FFD600';
                ctx.fillText(waveAnnouncement.text, 0, 0);
                
                // Draw subtitle with goal
                if (waveAnnouncement.missionObjective) {
                    let subtitleText = '';
                    if (waveAnnouncement.missionObjective === 1) {
                        subtitleText = 'Destroy all asteroids';
                    } else if (waveAnnouncement.missionObjective === 2) {
                        subtitleText = 'Destroy all asteroids and enemies';
                    }
                    
                    if (subtitleText) {
                        ctx.font = `36px 'Comic Sans MS', cursive, sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = 'white';
                        ctx.shadowBlur = blur;
                        ctx.fillStyle = 'white';
                        ctx.fillText(subtitleText, 0, 60);
                    }
                }
                
                ctx.restore();
                waveAnnouncement.timer--;
                if (waveAnnouncement.timer <= 0) {
    
                    waveAnnouncement = null;
                }
            }

            // In the main game loop (after wave completion logic, before drawing)
            if (gameState === GAME_STATE_TRANSITION_OUT) {
                // Calculate transition progress
                const total = (GAME_CONFIG.gameplay.transitionOutDuration || 3) * 60;
                const progress = 1 - (transitionOutTimer / total);
                
                // Phase out cinematic starfield over first 30% of transition
                const cinematicFadeOut = Math.max(0, 1 - (progress / 0.3));
                if (cinematic && cinematicFadeOut > 0) {
                    cinematic.updateStarfield();
                    ctx.save();
                    ctx.globalAlpha = cinematicFadeOut;
                    cinematic.drawStarfieldWithAlpha(1.0);
                    ctx.restore();
                }
                
                // Update and draw the world first, skipping the ship
                updateAndDrawGameWorld(true);

                // Darken the play area based on progress
                ctx.save();
                ctx.globalAlpha = 0.4 + 0.5 * progress;
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();


                // Update and draw star streaks
                for (let obj of graphicalObjects) {
                    if (obj.type === 'star') {
                        // Stars stay at min speed until launch point (progress = 0.5), then accelerate
                        let starSpeed, starLength;
                        if (progress < 0.5) {
                            // Before launch point: stay at minimum values
                            starSpeed = obj.baseSpeed;
                            starLength = 10;
                        } else {
                            // After launch point: accelerate over remaining time (0.5 seconds = 30 frames)
                            const accelerationProgress = (progress - 0.5) * 2; // 0 to 1 over remaining time
                            const speedRange = GAME_CONFIG.gameplay.transitionStars.maxSpeed - GAME_CONFIG.gameplay.transitionStars.minSpeed;
                            const lengthRange = 80; // Max length increase
                            starSpeed = obj.baseSpeed + speedRange * accelerationProgress;
                            starLength = 10 + lengthRange * accelerationProgress;
                        }
                        
                        obj.speed = starSpeed;
                        obj.length = starLength;
                        obj.y += obj.speed;
                        if (obj.y > canvas.height + obj.length) {
                            obj.y = -obj.length;
                            obj.x = Math.random() * canvas.width;
                        }
                        ctx.save();
                        ctx.globalAlpha = obj.alpha * (0.5 + 0.5 * progress);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(obj.x, obj.y);
                        ctx.lineTo(obj.x, obj.y + obj.length);
                        ctx.stroke();
                        ctx.restore();
                    }
                }

                // Now override ship position/angle for the transition
                // Ship accelerates to 4x speed, overshoots center, then drifts back
                let shipX, shipY;
                
                if (progress < 0.5) {
                    // First half: ship moves to launch point
                    const shipProgress = progress * 2;
                    shipX = transitionShipStart.x + (transitionShipTarget.x - transitionShipStart.x) * shipProgress;
                    shipY = transitionShipStart.y + (transitionShipTarget.y - transitionShipStart.y) * shipProgress;
                } else if (progress < 0.6) {
                    // 50-60%: ship holds at launch point
                    shipX = transitionShipTarget.x;
                    shipY = transitionShipTarget.y;
                } else {
                    // 60%+: ship accelerates and overshoots with proper physics updates
                    const accelerationProgress = (progress - 0.6) / 0.4; // 0 to 1 over remaining 40%
                    
                    // Initialize physics state if not already done
                    if (!ship._transitionPhysicsInitialized) {
                        ship._transitionPhysicsInitialized = true;
                        ship._transitionVelocity = 0;
                        ship._transitionPosition = 0;
                        ship._transitionPhase = 'accelerating';
                        ship._transitionStartTime = progress;
        
                        
                        // Play launch sound at the moment of launch
                        if (typeof playLaunchSound === 'function') {
                            playLaunchSound();
                            console.log('[Transition] Launch sound played');
                        }
                    }
                    
                    // Calculate time delta since last frame
                    const timeDelta = 1 / 60; // Assuming 60 FPS
                    const acceleration = GAME_CONFIG.ship.maxSpeed * 4; // Much higher acceleration
                    const maxSpeed = GAME_CONFIG.ship.maxSpeed * 3; // Much higher max speed for dramatic movement
                    
                    if (ship._transitionPhase === 'accelerating') {
                        // Accelerate until we reach max speed or 70% of acceleration phase
                        ship._transitionVelocity += acceleration * timeDelta;
                        if (ship._transitionVelocity >= maxSpeed || accelerationProgress >= 0.7) {
                            ship._transitionVelocity = maxSpeed;
                            ship._transitionPhase = 'decelerating';
                            console.log('[Transition] Switched to decelerating phase');
                        }
                    } else if (ship._transitionPhase === 'decelerating') {
                        // Decelerate until we stop
                        ship._transitionVelocity -= acceleration * timeDelta;
                        
                        if (ship._transitionVelocity <= 0) {
                            ship._transitionVelocity = 0;
                            ship._transitionPhase = 'stopped';
                            console.log('[Transition] Physics simulation complete');
                        }
                    }
                    
                    // Update position based on current velocity
                    ship._transitionPosition += ship._transitionVelocity * timeDelta;
                    
                    // Debug logging
                    if (ship._transitionPhase !== 'stopped') {
                        console.log(`[Transition] Phase: ${ship._transitionPhase}, Velocity: ${ship._transitionVelocity.toFixed(2)}, Position: ${ship._transitionPosition.toFixed(2)}`);
                    }
                    
                    // Ship moves UP from launch position (bottom center) and overshoots center
                    const centerY = canvas.height / 2; // Center of screen Y
                    const launchY = transitionShipTarget.y; // Launch position (bottom center)
                    
                    // Scale the movement to cover the full distance to center and beyond
                    const distanceToCenter = launchY - centerY; // Distance from launch to center
                    const scaledPosition = ship._transitionPosition * (distanceToCenter / 3); // Much larger scaling for dramatic overshoot
                    
                    // Debug: Log the key values
                    console.log(`[Transition] Launch Y: ${launchY.toFixed(1)}, Center Y: ${centerY.toFixed(1)}, Position: ${ship._transitionPosition.toFixed(2)}, Scaled: ${scaledPosition.toFixed(2)}`);
                    
                    // Ship stays at center horizontally and moves UP from launch position
                    shipX = transitionShipTarget.x;
                    
                    // Calculate launch position first
                    let launchShipY = launchY - scaledPosition; // Move UP from launch position with scaled movement
                    
                    // Check if physics is complete and ship is off screen - start re-entry
                    console.log(`[Transition] Checking re-entry conditions - Phase: ${ship._transitionPhase}, Launch ShipY: ${launchShipY.toFixed(1)}, Re-entry started: ${ship._reEntryStarted}`);
                    if (ship._transitionPhase === 'stopped' && launchShipY < -50 && !ship._reEntryStarted) {
                        ship._reEntryStarted = true;
                        ship._reEntryStartY = canvas.height + 50; // Just off bottom edge
                        ship._reEntryVelocity = GAME_CONFIG.ship.maxSpeed * 3; // Same as launch max speed
                        // Target point just short of center (about 2 ship lengths above center)
                        const targetY = centerY - 36; // 10% closer to bottom than before
                        ship._reEntryDistance = ship._reEntryStartY - targetY; // Distance to target
                        ship._reEntryPosition = 0;
                        console.log(`[Transition] Starting re-entry from bottom at Y: ${ship._reEntryStartY.toFixed(1)}`);
                        console.log(`[Transition] Re-entry distance: ${ship._reEntryDistance.toFixed(1)}, velocity: ${ship._reEntryVelocity.toFixed(1)}`);
                    }
                    
                    // If re-entry has started, use ONLY re-entry physics
                    if (ship._reEntryStarted) {
                        const reEntryProgress = ship._reEntryPosition / ship._reEntryDistance;
                        
                        console.log(`[Transition] Re-entry physics - Position: ${ship._reEntryPosition.toFixed(2)}, Progress: ${(reEntryProgress*100).toFixed(1)}%`);
                        
                        if (reEntryProgress < 0.5) {
                            // First 50%: maintain velocity
                            const oldPosition = ship._reEntryPosition;
                            ship._reEntryPosition += ship._reEntryVelocity;
                            console.log(`[Transition] Re-entry acceleration phase - Old pos: ${oldPosition.toFixed(2)}, New pos: ${ship._reEntryPosition.toFixed(2)}`);
                        } else {
                            // Last 50%: decelerate to center
                            const decelProgress = (reEntryProgress - 0.5) / 0.5; // 0 to 1 over last 50%
                            const decelFactor = 1 - (decelProgress * decelProgress); // Quadratic deceleration
                            
                            // Play deceleration sound when entering re-entry deceleration phase (only once)
                            if (!ship._reEntryDecelerationSoundPlayed) {
                                console.log('[Transition] Entering re-entry deceleration phase - attempting to play sound');
                                if (typeof soundManager !== 'undefined' && soundManager.playDecelerationSound) {
                                    soundManager.playDecelerationSound();
                                    ship._reEntryDecelerationSoundPlayed = true;
                                    console.log('[Transition] Re-entry deceleration sound triggered successfully');
                                } else {
                                    console.log('[Transition] Sound manager or playDecelerationSound not available');
                                }
                            }
                            
                            const oldPosition = ship._reEntryPosition;
                            ship._reEntryPosition += ship._reEntryVelocity * decelFactor;
                            console.log(`[Transition] Re-entry deceleration phase - Decel factor: ${decelFactor.toFixed(3)}, Old pos: ${oldPosition.toFixed(2)}, New pos: ${ship._reEntryPosition.toFixed(2)}`);
                        }
                        
                        shipY = ship._reEntryStartY - ship._reEntryPosition;
                        console.log(`[Transition] Re-entry final Y: ${shipY.toFixed(1)}, Distance traveled: ${ship._reEntryPosition.toFixed(1)}`);
                        
                        // Mark that ship has reached target for pulse effect in next wave
                        if (reEntryProgress >= 0.95 && !ship._reEntryPulseCreated) {
                            ship._reEntryPulseCreated = true;
                            ship._reEntryPulseReady = true; // Flag to create pulse in next wave
                        }
                    } else {
                        // Only use launch physics if NOT in re-entry
                        shipY = launchShipY; // Use the pre-calculated launch position
                        console.log(`[Transition] Launch physics - Moving UP from ${launchY.toFixed(1)} to ${shipY.toFixed(1)}`);
                    }
                    
                                    // Debug: Log the final calculated position
                console.log(`[Transition] Final position: (${shipX.toFixed(1)}, ${(shipY || 0).toFixed(1)})`);
                console.log(`[Transition] Overall state - Phase: ${ship._transitionPhase}, Re-entry: ${ship._reEntryStarted}, Timer: ${transitionOutTimer}`);
                }
                
                ship.x = shipX;
                ship.y = shipY;
                
                // Angle follows the same timing as position
                let angleProgress = Math.min(progress * 2, 1);
                if (progress >= 0.6) {
                    angleProgress = 1; // Keep angle at target once ship starts moving
                }
                let start = transitionShipStart.angle;
                let end = transitionShipTarget.angle;
                let delta = ((end - start + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
                ship.angle = start + delta * angleProgress;
                

                
                // Build-up effect once ship reaches launch point (progress >= 0.5)
                if (progress >= 0.5) {
                    const buildUpProgress = (progress - 0.5) * 2; // 0 to 1 over remaining time
                    
                    // Grid effects - create intense distortion waves
                    const buildUpIntensity = 30 + 20 * buildUpProgress; // Increasing intensity
                    const buildUpRadius = 50 + 100 * buildUpProgress; // Expanding radius
                    
                    // Create multiple grid distortion waves around the ship
                    for (let i = 0; i < 3; i++) {
                        const angle = (i * Math.PI * 2 / 3) + (buildUpProgress * Math.PI * 4); // Rotating waves
                        const waveX = ship.x + Math.cos(angle) * 30;
                        const waveY = ship.y + Math.sin(angle) * 30;
                        activeWaves.push(createWave(waveX, waveY, buildUpIntensity, 30, 3));
                    }
                    
                    // Grid intensity glow effect (disabled during re-entry)
                    // if (!ship._reEntryStarted) {
                    //     const glowIntensity = 1.5 + buildUpProgress * 2; // Very bright glow
                    //     const glowRadius = 80 + buildUpProgress * 120; // Expanding glow
                    //     setGridIntensityCircle(ship.x, ship.y, glowRadius, glowIntensity);
                    // }
                    
                    // Ship glow effect
                    ship._buildUpGlow = true;
                    ship._buildUpIntensity = buildUpProgress;
                    
                    // Play build-up sound (only once)
                    if (!ship._buildUpSoundPlayed) {
                        if (typeof playBuildUpSound === 'function') {
                            playBuildUpSound();
                        }
                        ship._buildUpSoundPlayed = true;
                    }
                    
                    // Play warp speed effect when ship starts moving to center (at 60% progress)
                    if (progress >= 0.6 && !ship._warpSpeedPlayed) {
                        if (typeof playWarpSpeedSound === 'function') {
                            playWarpSpeedSound();
                        }
                        ship._warpSpeedPlayed = true;
                    }
                }

                // Draw the ship on top of the darkening and stars
                if (typeof drawShip === 'function') {
                    drawShip();
                }

                // Draw transition text with countdown
                ctx.save();
                ctx.font = 'bold 40px Courier New, monospace';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                
                if (progress < 0.6) {
                    // Show "PREPARING FOR LAUNCH" and fade it out before launch
                    const prepareAlpha = 1 - (progress / 0.6); // Fade out over first 60%
                    if (prepareAlpha > 0) {
                        ctx.globalAlpha = prepareAlpha;
                        ctx.fillText('PREPARE FOR LIGHTSPEED', canvas.width / 2, canvas.height / 2);
                    }
                }
                // After progress >= 0.6 (launch happens), no text is shown
                
                ctx.restore();
                ship._forceThrustOn = true;
                // Play thrust sound during transition (only start once)
                if (typeof startThrustSound === 'function' && !ship._transitionThrustStarted) {
                    startThrustSound();
                    ship._transitionThrustStarted = true;
                }
                if (transitionOutTimer > 0) {
                    transitionOutTimer--;
                }
                if (transitionOutTimer === 0) {
                    ship._forceThrustOn = false;
                    // Stop thrust sound when transition ends
                    if (typeof stopThrustSound === 'function') {
                        stopThrustSound();
                        ship._transitionThrustStarted = false;
                    }
                    // Remove all star objects from graphicalObjects
                    for (let i = graphicalObjects.length - 1; i >= 0; i--) {
                        if (graphicalObjects[i].type === 'star') {
                            graphicalObjects.splice(i, 1);
                        }
                    }
                    
                    // Clean up build-up effects
                    ship._buildUpGlow = false;
                    ship._buildUpIntensity = undefined;
                    ship._buildUpSoundPlayed = false;
                    ship._warpSpeedPlayed = false;
                    ship._glowFadeOut = true; // Start glow fade-out
                    ship._glowFadeTimer = 60; // 1 second fade at 60fps
                    ship._transitionPhysicsInitialized = false;
                    ship._transitionVelocity = undefined;
                    ship._transitionPosition = undefined;
                    ship._transitionPhase = undefined;
                    ship._reEntryDecelerationSoundPlayed = false;
                    ship._reEntryStarted = false;
                    ship._reEntryStartY = undefined;
                    ship._reEntryVelocity = undefined;
                    ship._reEntryDistance = undefined;
                    ship._reEntryPosition = undefined;
                    ship._reEntryPulseCreated = undefined;

                    // Give ship a small forward momentum (about 2 ship lengths worth)
                    ship.vx = 0;
                    ship.vy = -2; // Small upward velocity to travel about 2 ship lengths

                    // Give ship immunity after transition (same as respawn)
                    giveShipImmunity();

                    // Increment wave number for all wave transitions (except the intro to wave 1 transition)
                    if (!ship._isFirstTransition) {
                        currentWave++;
                    }
                    // Clear the first transition flag
                    ship._isFirstTransition = false;
                    setGameState(GAME_STATE_PLAYING);
                    spawnWave();
                }
                return;
            }
        }

        function resetCursorVisibility() {
            canvas.style.cursor = 'default';
            clearTimeout(cursorHideTimeout);
            cursorHideTimeout = setTimeout(() => {
                canvas.style.cursor = 'none';
            }, 3000);
        }

        console.log('Loading game data...');
        loadGameData()
            .then(config => {
                GAME_CONFIG = config;
                console.log('Game data loaded successfully:', GAME_CONFIG);
                console.log('High scores loaded:', highScores);
                console.log('Initializing game...');
                
                // Update sound manager with game config
                if (soundManager) {
                    soundManager.gameConfig = GAME_CONFIG;
                }
                
                // Initialize the grid distortion system
                initializeGrid();
                initializeGridIntensityArray();
                
                attractModeTimer = GAME_CONFIG.gameplay.attractModeDuration * 60;

                canvas.style.cursor = 'none';
                window.addEventListener('mousemove', resetCursorVisibility);
                document.addEventListener('visibilitychange', handleVisibilityChange);

                let lastFpsUpdate = 0;
                let framesThisSecond = 0;
                setInterval(() => {
                    const currentTime = performance.now();
                    framesThisSecond++;
                    if(currentTime > lastFpsUpdate + 1000) { fps = framesThisSecond; framesThisSecond = 0; lastFpsUpdate = currentTime; fpsDisplay.textContent = fps; }
                    gameLoop();
                }, 1000 / 60);
            })
            .catch(error => {
                ctx.fillStyle = 'red';
                ctx.font = '18px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('ERROR: Could not load game data. See console.', canvas.width / 2, canvas.height / 2);
            });

        // Main game state variables
        let powerups = [];
        let activePowerup = null; // e.g., { type: 'TRIPPLE_SHOT', timer: 1200, ... }
        let shipFlashFrames = 0;
        let shipPickupParticles = [];

        function updatePowerups() {
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                // Move
                p.x += p.vx;
                p.y += p.vy;
                // Screen wrap
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                // Apply attract force when ship is close (only during gameplay)
                if (gameState === 'playing' && !shipDead && !ship.isSpawning) {
                    const dist = Math.hypot(p.x - ship.x, p.y - ship.y);
                    if (dist < GAME_CONFIG.powerups.attractDistance) {
                        // Calculate attract force - stronger when closer
                        const forceMultiplier = 1 - (dist / GAME_CONFIG.powerups.attractDistance);
                        const attractAngle = Math.atan2(ship.y - p.y, ship.x - p.x);
                        const force = GAME_CONFIG.powerups.attractForce * forceMultiplier;
                        
                        // Apply force to powerup velocity
                        p.vx += Math.cos(attractAngle) * force;
                        p.vy += Math.sin(attractAngle) * force;
                    }
                }
                
                // Bounce off asteroids (like novabomb)
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const asteroid = asteroids[j];
                    const dist = Math.hypot(p.x - asteroid.x, p.y - asteroid.y);
                    if (dist < (p.radius || 12) + asteroid.size) {
                        bouncePowerupOffObject(p, asteroid);
                        break;
                    }
                }
                // Bounce off enemy ships
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (enemy.isDestroyed) continue;
                    const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                    if (dist < (p.radius || 12) + enemy.size) {
                        bouncePowerupOffObject(p, enemy);
                        break;
                    }
                }
                // Clamp velocity to maxVelocity
                const maxV = GAME_CONFIG.powerups.maxVelocity;
                const speed = Math.hypot(p.vx, p.vy);
                if (speed > maxV) {
                    p.vx = (p.vx / speed) * maxV;
                    p.vy = (p.vy / speed) * maxV;
                }
                // Destroy if hit by projectile
                for (let k = projectiles.length - 1; k >= 0; k--) {
                    const proj = projectiles[k];
                    const dist = Math.hypot(p.x - proj.x, p.y - proj.y);
                    if (dist < (p.radius || 12) + (proj.radius || 3)) {
                        spawnPowerupDestructionEffect(p.x, p.y, p.radius || 12);
                        powerups.splice(i, 1);
                        break;
                    }
                }
                // Pickup if ship touches
                if (!shipDead && !ship.isSpawning) {
                    const dist = Math.hypot(p.x - ship.x, p.y - ship.y);
                    if (dist < (p.radius || 12) + ship.size) {
                        playPowerupPickupSound();
                        triggerShipFlash();
                        // Apply powerup effect
                        const pDef = GAME_CONFIG.powerups.list.find(def => def.id === p.type);
                        activatePowerup(pDef);
                        powerups.splice(i, 1);
                        break;
                    }
                }
            }
            // Update active powerup timer
            if (activePowerup && activePowerup.timer !== -1) {
                activePowerup.timer--;
                if (activePowerup.timer <= 0) {
                    console.log(`[Powerup] Expired: ${activePowerup.type}`);
                    playPowerupOffSound();
                    activePowerup = null;
                }
            }
            // Log active powerup timer
            if (activePowerup) {
                const time = activePowerup.timer === -1 ? 'permanent' : (activePowerup.timer / 60).toFixed(2) + 's';
                console.log(`[Powerup] Active: ${activePowerup.type}, timer: ${time}`);
            }
        }

        function drawPowerups() {
            for (const p of powerups) {
                ctx.save();
                ctx.translate(p.x, p.y);
                
                // Add grid intensity effect under powerup (bright flash like small asteroid)
                setGridIntensityCircle(p.x, p.y, 40, 0.8);
                
                // Calculate animation values
                const time = performance.now() * 0.003; // Time-based animation
                const glowIntensity = 0.5 + 0.5 * Math.sin(time * 2); // Pulsing glow
                const morphScale = 1.0 + 0.1 * Math.sin(time * 3); // Shape morphing
                const rotation = time * 0.5; // Slow rotation
                
                // Draw outer glow
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 15 + glowIntensity * 20;
                ctx.globalAlpha = 0.3 + glowIntensity * 0.4;
                
                // Draw glow circle
                ctx.beginPath();
                ctx.arc(0, 0, p.radius * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                
                // Reset shadow for main powerup
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
                
                // Apply rotation and morphing
                ctx.rotate(rotation);
                ctx.scale(morphScale, 1.0 / morphScale); // Morph between circle and oval
                
                // 3D shading effect - draw darker bottom layer
                ctx.fillStyle = '#000';
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.arc(2, 2, p.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Main powerup body with gradient-like effect
                ctx.globalAlpha = 1.0;
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, p.radius);
                gradient.addColorStop(0, p.color);
                gradient.addColorStop(0.7, p.color);
                gradient.addColorStop(1, '#000');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Bright highlight for 3D effect
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(-p.radius * 0.3, -p.radius * 0.3, p.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                // Border with glow
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 3;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Reset transform for symbol
                ctx.setTransform(1, 0, 0, 1, p.x, p.y);
                
                // Draw symbol with glow
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 5;
                ctx.fillStyle = '#222';
                ctx.font = `${p.radius * 1.4}px Courier New`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.symbol, 0, 2);
                
                ctx.restore();
            }
        }

        function bouncePowerupOffObject(powerup, object) {
            playPowerupBounceSound();
            const px = powerup.x, py = powerup.y;
            const ox = object.x, oy = object.y;
            const pr = powerup.radius || 12;
            const or = object.size || object.radius || 16;
            const dist = Math.hypot(px - ox, py - oy);
            const angle = Math.atan2(py - oy, px - ox);
            const speed = Math.hypot(powerup.vx, powerup.vy);
            // Double the impulse
            powerup.vx = Math.cos(angle) * speed * 2;
            powerup.vy = Math.sin(angle) * speed * 2;
            // Move powerup out of collision
            powerup.x = ox + Math.cos(angle) * (pr + or);
            powerup.y = oy + Math.sin(angle) * (pr + or);
        }

        function drawGrid() {
            ctx.save();
            const baseGridOpacity = GAME_CONFIG.world.grid.opacity;
            
            // Draw vertical line segments cell by cell
            for (let col = 0; col < GRID_COLS; col++) {
                for (let row = 0; row < GRID_ROWS - 1; row++) {
                    const startVertex = gridVertices[row][col];
                    const endVertex = gridVertices[row + 1][col];
                    
                    // Get intensity for this specific grid cell
                    const cellX = startVertex.x;
                    const cellY = startVertex.y;
                    const intensity = getGridIntensity(cellX, cellY);
                    
                    let opacity = baseGridOpacity;
                    let brightness = 1.0;
                    
                    if (intensity < 0) {
                        // Negative intensity: reduce opacity (darken)
                        opacity = baseGridOpacity * (1 + intensity);
                    } else if (intensity > 0) {
                        // Positive intensity: use intensity directly as opacity when base is 0
                        brightness = 1 + intensity;
                        if (baseGridOpacity === 0) {
                            opacity = Math.min(1.0, intensity);
                        } else {
                            opacity = Math.min(1.0, baseGridOpacity + intensity * 0.5);
                        }
                    }
                    
                    ctx.strokeStyle = `rgba(0, ${Math.min(255, 255 * brightness)}, 0, ${opacity})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(startVertex.x, startVertex.y);
                    ctx.lineTo(endVertex.x, endVertex.y);
                    ctx.stroke();
                }
            }
            
            // Draw horizontal line segments cell by cell
            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS - 1; col++) {
                    const startVertex = gridVertices[row][col];
                    const endVertex = gridVertices[row][col + 1];
                    
                    // Get intensity for this specific grid cell

                    const cellY = startVertex.y;

                    let opacity = baseGridOpacity;

                    } else if (intensity > 0) {

                    ctx.strokeStyle = `rgba(0, ${Math.min(255, 255 * brightness)}, 0, ${opacity})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(startVertex.x, startVertex.y);

            ctx.translate(debris.x, debris.y);
            ctx.rotate(debris.angle);
            ctx.strokeStyle = `rgba(${debris.color === '#ff6600' ? '255, 102, 0' : debris.color === '#00ff00' ? '0, 255, 0' : '255, 255, 255'}, ${Math.max(0, debris.life / 120)})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-debris.size, -debris.size/2);
            ctx.lineTo(debris.size, 0);
            ctx.lineTo(-debris.size, debris.size/2);
            ctx.stroke();
            ctx.restore();
        }

        function initializeGrid() {
            gridVertices = [];
            for (let row = 0; row < GRID_ROWS; row++) {
                gridVertices[row] = [];
                for (let col = 0; col < GRID_COLS; col++) {
                    gridVertices[row][col] = {
                        x: col * GRID_SPACING,
                        y: row * GRID_SPACING,
                        originalX: col * GRID_SPACING,
                        originalY: row * GRID_SPACING
                    };
                }
            }
        }

        function createWave(x, y, intensity, duration, speed) {
            return {
                x: x,
                y: y,
                intensity: intensity,
                duration: duration,
                speed: speed,
                timer: 0,
                maxRadius: 200
            };
        }

        function updateGridDistortion() {
            // Reset vertices to original positions
            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS; col++) {
                    const vertex = gridVertices[row][col];
                    vertex.x = vertex.originalX;
                    vertex.y = vertex.originalY;
                }
            }

            // Apply wave effects
            for (let i = activeWaves.length - 1; i >= 0; i--) {
                const wave = activeWaves[i];
                wave.timer++;
                
                if (wave.timer >= wave.duration) {
                    activeWaves.splice(i, 1);
                    continue;
                }

                const progress = wave.timer / wave.duration;
                const currentRadius = wave.maxRadius * progress;
                const waveStrength = wave.intensity * (1 - progress);

                // Apply displacement to vertices within range
                for (let row = 0; row < GRID_ROWS; row++) {
                    for (let col = 0; col < GRID_COLS; col++) {
                        const vertex = gridVertices[row][col];
                        const distance = Math.sqrt((vertex.originalX - wave.x) ** 2 + (vertex.originalY - wave.y) ** 2);
                        
                        if (distance <= currentRadius) {
                            const wavePhase = (distance / wave.speed) - wave.timer * 0.1;
                            const displacement = Math.sin(wavePhase) * waveStrength * (1 - distance / currentRadius);
                            
                            // Calculate direction from wave center to vertex
                            const angle = Math.atan2(vertex.originalY - wave.y, vertex.originalX - wave.x);
                            
                            vertex.x += Math.cos(angle) * displacement;
                            vertex.y += Math.sin(angle) * displacement;
                        }
                    }
                }
            }

            // Apply rolling shockwave effects
            updateRollingShockwaves();
            
            // Apply ship wake effect - gently push vertices away from ship
            if (gameState === 'playing' && !shipDead && !gameOver && !ship.isSpawning) {
                const shipWakeRadius = 40; // Radius of ship's wake effect
                const shipWakeStrength = 8; // How strongly vertices are pushed away
                const shipWakeRecovery = 0.1; // How quickly vertices return to normal
                
                for (let row = 0; row < GRID_ROWS; row++) {
                    for (let col = 0; col < GRID_COLS; col++) {
                        const vertex = gridVertices[row][col];
                        const distance = Math.sqrt((vertex.originalX - ship.x) ** 2 + (vertex.originalY - ship.y) ** 2);
                        
                        if (distance <= shipWakeRadius) {
                            // Calculate displacement strength based on distance
                            const displacementStrength = shipWakeStrength * (1 - distance / shipWakeRadius);
                            
                            // Calculate direction from ship to vertex (push away)
                            const angle = Math.atan2(vertex.originalY - ship.y, vertex.originalX - ship.x);
                            
                            // Apply gentle outward displacement
                            vertex.x += Math.cos(angle) * displacementStrength;
                            vertex.y += Math.sin(angle) * displacementStrength;
                        } else {
                            // Gradually return vertices to their original positions
                            const dx = vertex.originalX - vertex.x;
                            const dy = vertex.originalY - vertex.y;
                            vertex.x += dx * shipWakeRecovery;
                            vertex.y += dy * shipWakeRecovery;
                        }
                    }
                }
            }
        }

        // Rolling shockwave function for Cygnus black holes
        function createRollingShockwave(epicenterX, epicenterY, intensity = 30, speed = 3) {
            const shockwave = {
                x: epicenterX,
                y: epicenterY,
                intensity: intensity,
                speed: speed,
                timer: 0,
                maxRadius: Math.max(canvas.width, canvas.height) * 1.5, // Cover entire screen plus margin
                waveFront: 0,
                recoveryRate: 0.15, // How quickly vertices recover behind the wave
                isActive: true
            };
            
            console.log(`[Shockwave] Created rolling shockwave at (${epicenterX}, ${epicenterY}) with intensity ${intensity}, speed ${speed}`);
            return shockwave;
        }

        // Array to hold active rolling shockwaves
        // let activeShockwaves = []; // Moved to global variables section

        // Update function for rolling shockwaves
        function updateRollingShockwaves() {
            for (let i = activeShockwaves.length - 1; i >= 0; i--) {
                const shockwave = activeShockwaves[i];
                shockwave.timer++;
                shockwave.waveFront += shockwave.speed;
                
                // Remove shockwave when it has traveled beyond screen bounds
                if (shockwave.waveFront > shockwave.maxRadius) {
                    activeShockwaves.splice(i, 1);
                    continue;
                }

                // Apply shockwave effect to grid vertices
                for (let row = 0; row < GRID_ROWS; row++) {
                    for (let col = 0; col < GRID_COLS; col++) {
                        const vertex = gridVertices[row][col];
                        const distance = Math.sqrt((vertex.originalX - shockwave.x) ** 2 + (vertex.originalY - shockwave.y) ** 2);
                        
                        // Calculate wave effect based on distance from epicenter
                        if (distance <= shockwave.waveFront) {
                            // Calculate how far behind the wave front this vertex is
                            const distanceBehindFront = shockwave.waveFront - distance;
                            
                            // Strong displacement at the wave front, quickly recovering behind
                            let displacementStrength;
                            if (distanceBehindFront <= 20) {
                                // At the wave front - maximum displacement
                                displacementStrength = shockwave.intensity;
                            } else {
                                // Behind the wave front - exponential recovery
                                displacementStrength = shockwave.intensity * Math.exp(-shockwave.recoveryRate * distanceBehindFront);
                            }
                            
                            // Calculate displacement direction (outward from epicenter)
                            const angle = Math.atan2(vertex.originalY - shockwave.y, vertex.originalX - shockwave.x);
                            
                            // Apply displacement
                            const displacement = displacementStrength * (1 - distance / shockwave.maxRadius);
                            vertex.x += Math.cos(angle) * displacement;
                            vertex.y += Math.sin(angle) * displacement;
                        }
                    }
                }
            }
        }

        // Function to trigger rolling shockwave from Cygnus black hole
        function triggerBlackHoleShockwave(blackHole) {

        // Grid intensity array for localized opacity/brightness control
        let gridIntensityArray = [];
        const GRID_INTENSITY_COLS = 80;
        const GRID_INTENSITY_ROWS = 60;
        const GRID_INTENSITY_DECAY = 0.01; // How quickly intensity values decay per frame

        // Initialize grid intensity array
        function initializeGridIntensityArray() {
            gridIntensityArray = [];
            for (let row = 0; row < GRID_INTENSITY_ROWS; row++) {
                gridIntensityArray[row] = [];
                for (let col = 0; col < GRID_INTENSITY_COLS; col++) {
                    gridIntensityArray[row][col] = 0;
                }
            }
        }

        // Update grid intensity array - decay values back to 0
        function updateGridIntensityArray() {
            for (let row = 0; row < GRID_INTENSITY_ROWS; row++) {
                for (let col = 0; col < GRID_INTENSITY_COLS; col++) {
                    if (gridIntensityArray[row][col] > 0) {
                        gridIntensityArray[row][col] = Math.max(0, gridIntensityArray[row][col] - GRID_INTENSITY_DECAY);
                    } else if (gridIntensityArray[row][col] < 0) {
                        gridIntensityArray[row][col] = Math.min(0, gridIntensityArray[row][col] + GRID_INTENSITY_DECAY);
                    }
                }
            }
        }

        // Get intensity value for a specific grid position
        function getGridIntensity(x, y) {
            const intensitySpacingX = canvas.width / GRID_INTENSITY_COLS;
            const intensitySpacingY = canvas.height / GRID_INTENSITY_ROWS;
            const col = Math.floor(x / intensitySpacingX);
            const row = Math.floor(y / intensitySpacingY);
            
            if (row >= 0 && row < GRID_INTENSITY_ROWS && col >= 0 && col < GRID_INTENSITY_COLS) {
                return gridIntensityArray[row][col];
            }
            return 0;
        }

        // Set intensity for a circular area
        function setGridIntensityCircle(centerX, centerY, radius, intensity) {
            // Calculate the correct spacing for grid intensity coordinates
            const intensitySpacingX = canvas.width / GRID_INTENSITY_COLS;  // 800 / 80 = 10
            const intensitySpacingY = canvas.height / GRID_INTENSITY_ROWS; // 600 / 60 = 10
            
            for (let row = 0; row < GRID_INTENSITY_ROWS; row++) {
                for (let col = 0; col < GRID_INTENSITY_COLS; col++) {
                    // Use the center of each grid cell
                    const x = (col + 0.5) * intensitySpacingX;
                    const y = (row + 0.5) * intensitySpacingY;
                    const distance = Math.sqrt((x - centerX) ** 2 + (y - centerY) ** 2);
                    
                    if (distance <= radius) {
                        const falloff = 1 - (distance / radius);
                        const localIntensity = intensity * falloff;
                        gridIntensityArray[row][col] = Math.max(-1, Math.min(1, localIntensity));
                    }
                }
            }
        }

        // Helper function to check if a collision was caused by a player projectile
        function isPlayerProjectileCollision(projectile) {

        // Helper function to award score only for player projectile kills
        function awardScoreForKill(object, scoreValue, x, y) {

        function breakAsteroid(asteroid, awardScore = true, projectile = null) {
            asteroid.isWeaponized = false;
            const originalSize = asteroid.size;
            
            // Only award score if this was caused by a player projectile
            if(awardScore && isPlayerProjectileCollision(projectile)) {
                if (originalSize >= 35) score += GAME_CONFIG.enemies.asteroids.scoreLarge;
                else if (originalSize >= 15) score += GAME_CONFIG.enemies.asteroids.scoreMedium;
                else score += GAME_CONFIG.enemies.asteroids.scoreSmall;
                checkExtraLife();
            }
            let soundSize; if (originalSize >= 35) soundSize = 1.0; else if (originalSize >= 15) soundSize = 0.7; else soundSize = 0.6;
            playExplosionSound(soundSize);
            // --- Powerup spawn logic ---
            const waveData = getCurrentWaveData();
            if (originalSize >= 15 && powerupsSpawned < waveData.powerupLimit) { // Large or Medium
                let chance = (originalSize >= 35) ? GAME_CONFIG.powerups.spawnChanceLarge : GAME_CONFIG.powerups.spawnChanceMedium;
                if (Math.random() < chance && GAME_CONFIG.powerups.list.length > 0) {
                    const pDef = GAME_CONFIG.powerups.list[0]; // Only one for now
                    // Random velocity
                    const angle = Math.random() * Math.PI * 2;
                    const speed = pDef.initialSpeedMin + Math.random() * (pDef.initialSpeedMax - pDef.initialSpeedMin);
                    powerups.push({
                        type: pDef.id,
                        symbol: pDef.symbol,
                        color: pDef.color,
                        x: asteroid.x,
                        y: asteroid.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: pDef.radius
                    });
                    powerupsSpawned++;
                }
            }
            // ---
            if (originalSize <= 10) { 
                createPointCloudEffect(asteroid.x, asteroid.y); 
                // Add grid intensity flash for small asteroid explosions
                console.log(`[GridIntensity] Small asteroid explosion at (${asteroid.x.toFixed(1)}, ${asteroid.y.toFixed(1)}) - applying intensity flash`);
                setGridIntensityCircle(asteroid.x, asteroid.y, 80, 1.5);
                return []; 
            }
            
            // Add grid intensity flash for all asteroid explosions
            let intensity = 0.8; // Base intensity for medium/large asteroids (increased from 0.45)
            let radius = 60; // Base radius for medium/large asteroids
            
            if (originalSize >= 35) {
                // Large asteroids - strong effect
                intensity = 1.0; // Increased from 0.525
                radius = 70;
            } else if (originalSize >= 15) {
                // Medium asteroids - very strong effect
                intensity = 1.2; // Increased from 0.6
                radius = 65;
            }
            
            console.log(`[GridIntensity] Asteroid explosion at (${asteroid.x.toFixed(1)}, ${asteroid.y.toFixed(1)}) - size: ${originalSize}, intensity: ${intensity}, radius: ${radius}`);
            setGridIntensityCircle(asteroid.x, asteroid.y, radius, intensity);
            const newSize = originalSize / 2; const fragments = []; const baseSpeed = (2 + Math.random() * 3) * 0.75;
            for (let i = 0; i < 2; i++) { const angle = Math.random() * Math.PI * 2; const speed = baseSpeed * (1 + (Math.random() - 0.5) * 0.2); fragments.push(createAsteroid(asteroid.x + (Math.random() - 0.5) * 20, asteroid.y + (Math.random() - 0.5) * 20, newSize, Math.cos(angle) * speed, Math.sin(angle) * speed)); }
            return fragments;
        }

        // Clear all grid intensity effects
        function clearAllGridIntensityEffects() {
            console.log('[GridIntensity] Clearing all grid intensity effects');
            for (let row = 0; row < GRID_INTENSITY_ROWS; row++) {

        // Set intensity value for a specific grid position
        function setGridIntensity(x, y, intensity) {

            const intensitySpacingY = canvas.height / GRID_INTENSITY_ROWS;

            if (row >= 0 && row < GRID_INTENSITY_ROWS && col >= 0 && col < GRID_INTENSITY_COLS) {

        // Helper to draw the base background (solid color or image)
        function drawBackgroundImageOrColor() {
            const img = getBackgroundImage();
            if (img) {
                // Smart scaling to cover the canvas (like CSS cover)
                const canvasAspect = canvas.width / canvas.height;
                const imageAspect = img.width / img.height;
                let drawWidth, drawHeight, offsetX, offsetY;
                if (imageAspect > canvasAspect) {
                    drawHeight = canvas.height;
                    drawWidth = canvas.height * imageAspect;
                    offsetX = (canvas.width - drawWidth) / 2;
                    offsetY = 0;
                } else {
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / imageAspect;
                    offsetX = 0;
                    offsetY = (canvas.height - drawHeight) / 2;
                }
                ctx.save();
                ctx.globalAlpha = 0.3; // Semi-transparent so it doesn't interfere with gameplay
                ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
                ctx.restore();
            } else {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // Global background image and loader state
        let backgroundImage = new Image();
        let backgroundImageLoaded = false;

            backgroundImageLoaded = false;
            backgroundImage = new Image();
            backgroundImage.onload = function() { backgroundImageLoaded = true; };
            backgroundImage.src = src;
        }

        function getBackgroundImage() {
            return backgroundImageLoaded ? backgroundImage : null;

        function drawPacmanLines() {
            // Draw a yellow line from the center of the screen to each active Pac-Man

            ctx.strokeStyle = 'yellow';

            graphicalObjects.forEach(obj => {

                    ctx.beginPath();
                    ctx.moveTo(canvas.width / 2, canvas.height / 2);

            });
